<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Nexus - AI Voice Assistant</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts: Inter & Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Background Elements -->
        <div class="glow-sphere main-glow"></div>
        <div class="glow-sphere second-glow"></div>
        
        <!-- Main Content -->
        <main class="content">
            <header class="header">
                <div class="logo">
                    <span class="nexus-text">NEXUS</span>
                </div>
                <div class="status-indicator">
                    <span id="status-text">Ready</span>
                    <div class="pulse-dot"></div>
                </div>
            </header>

            <!-- The Nexus Orb -->
            <div class="orb-container">
                <div id="nexus-orb" class="orb idle">
                    <div class="orb-inner"></div>
                    <div class="orb-glow"></div>
                    <!-- Audio Visualizer Waves -->
                    <div class="waves">
                        <div class="wave"></div>
                        <div class="wave"></div>
                        <div class="wave"></div>
                    </div>
                </div>
            </div>

            <!-- Interaction Interface -->
            <div class="interaction-area">
                <div id="transcript-container" class="transcript-box">
                    <p id="user-speech" class="user-text"></p>
                    <p id="ai-response" class="ai-text"></p>
                </div>
                
                <div class="controls">
                    <button id="mic-btn" class="mic-button" aria-label="Toggle Microphone">
                        <svg class="mic-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path>
                            <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                            <line x1="12" y1="19" x2="12" y2="22"></line>
                        </svg>
                        <span class="btn-text">Tap to Speak</span>
                    </button>
                    
                    <button id="settings-btn" class="icon-button" aria-label="Settings">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="3"></circle>
                            <path d="M12 1v6m0 6v6M4.22 4.22l4.24 4.24m2.12 2.12l4.24 4.24M1 12h6m6 0h6M4.22 19.78l4.24-4.24m2.12-2.12l4.24-4.24M19.78 4.22l-4.24 4.24m-2.12 2.12l-4.24 4.24M23 12h-6m-6 0H5M19.78 19.78l-4.24-4.24m-2.12-2.12l-4.24-4.24"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </main>
        
        <!-- Settings Modal (Glassmorphism) -->
        <div id="settings-modal" class="modal hidden">
            <div class="modal-content glass">
                <h2>Assistant Settings</h2>
                <div class="setting-group">
                    <label for="api-key">Gemini API Key</label>
                    <input type="password" id="api-key-input" placeholder="Enter your Google AI API Key">
                    <p class="hint">Your key is stored locally in your browser.</p>
                </div>
                <div class="setting-group">
                    <label for="voice-select">Assistant Voice</label>
                    <select id="voice-select"></select>
                </div>
                <button id="save-settings" class="primary-btn">Save & Close</button>
            </div>
        </div>

        <!-- Footer -->
        <footer class="footer">
            <p>Powered by Gemini Multi-modal Intelligence</p>
        </footer>
    </div>

    <!-- Core Script -->
    <script src="app.js"></script>
</body>
</html>
